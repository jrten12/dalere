name: Refresh board news

on:
  schedule:
    # Daily ~6–7am US Eastern (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape any missing PROS parcels
        run: python build_permits.py --resume --delay 0.25

      - name: Build news feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python build_news.py --ai --pdf-depth 4
          else
            python build_news.py --pdf-depth 4
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No news changes."
          else
            git commit -m "Refresh board news from village agendas and permits."
            git push
          fi

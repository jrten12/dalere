name: Refresh permits and news

on:
  schedule:
    # Sundays ~4–5am US Eastern (09:00 UTC)
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape PROS permits
        run: python build_permits.py --resume --delay 0.2

      - name: Rebuild news feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python build_news.py --ai
          else
            python build_news.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/permits.json data/news.json
          if git diff --staged --quiet; then
            echo "No permit or news changes."
          else
            git commit -m "Refresh PROS permits scrape and board news feed."
            git push
          fi
